- name: "OpenWRT: Check if python3 is already installed"
  ansible.builtin.raw: which python3
  become: false
  register: python_check
  check_mode: false
  failed_when: false
  changed_when: false

- name: "OpenWRT: Update package list and install python3"
  ansible.builtin.raw: apk update && apk add python3
  become: false
  when: python_check.rc != 0